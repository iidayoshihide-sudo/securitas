name: Daily Data Backup

on:
  schedule:
    - cron: '0 20 * * *'   # 毎日 JST 05:00 (UTC 20:00)
  workflow_dispatch:        # 手動実行も可能

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Export Supabase org_data
        run: |
          DATE=$(date +%Y-%m-%d)
          mkdir -p backups

          # Supabase REST API でバックアップ取得（service_role キーでRLS回避）
          curl -s \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/org_data?select=*" \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          out = {'backup_date': '$DATE', 'source': 'github_actions', 'rows': data}
          print(json.dumps(out, ensure_ascii=False, indent=2))
          " > backups/${DATE}.json

          # 最新バックアップとして latest.json にもコピー
          cp backups/${DATE}.json backups/latest.json

          # 30日以上古いバックアップを削除
          find backups/ -name "*.json" -not -name "latest.json" | sort | head -n -30 | xargs rm -f 2>/dev/null || true

      - name: Commit backup
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          git diff --cached --quiet && echo "変更なし" || \
            git commit -m "backup: $(date +%Y-%m-%d) 自動バックアップ"
          git push
